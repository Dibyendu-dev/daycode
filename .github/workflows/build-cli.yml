name: Build CLI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile 2>&1
      - run: bun run --cwd packages/cli build 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: daycode-windows-x64
          path: packages/cli/daycode.exe
        if: success()

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile 2>&1
      - run: bun run --cwd packages/cli build 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: daycode-linux-x64
          path: packages/cli/daycode
        if: success()

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun --version
      - run: bun install --frozen-lockfile 2>&1
      - run: bun run --cwd packages/cli build 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: daycode-darwin-arm64
          path: packages/cli/daycode
        if: success()

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir -p release
          cp daycode-windows-x64/daycode.exe release/daycode-windows-x64.exe
          cp daycode-linux-x64/daycode release/daycode-linux-x64
          cp daycode-darwin-arm64/daycode release/daycode-darwin-arm64
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          files: release/*
          body: "Automated build of latest commit."
